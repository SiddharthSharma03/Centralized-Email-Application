<div class="flex h-screen bg-slate-50 font-sans text-slate-800 selection:bg-indigo-100 selection:text-indigo-900 overflow-hidden">
  
  @if (showSidebar()) {
    <aside class="w-64 bg-white/80 backdrop-blur-xl border-r border-slate-200/60 flex flex-col shadow-lg shadow-slate-200/20 z-50">
      
      <div class="h-20 flex items-center px-6 border-b border-slate-100">
        <div class="w-8 h-8 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg shadow-md shadow-indigo-500/20 flex items-center justify-center text-white mr-3">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
          </svg>
        </div>
        <span class="font-black text-xl tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-700">CentralMail</span>
      </div>

      <nav class="flex-1 px-4 py-6 space-y-2">
        <div class="text-xs font-bold text-slate-400 uppercase tracking-widest px-2 mb-4">Modules</div>
        
        <a routerLink="/reports" 
           routerLinkActive="bg-indigo-50 text-indigo-700 font-bold border-indigo-200" 
           [routerLinkActiveOptions]="{exact: true}" 
           class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-500 hover:text-slate-800 hover:bg-slate-50 border border-transparent transition-all duration-200 group">
          <svg class="w-5 h-5 text-slate-400 group-hover:text-indigo-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
          </svg>
          Dashboard
        </a>

        <a routerLink="/dispatch" 
           routerLinkActive="bg-indigo-50 text-indigo-700 font-bold border-indigo-200" 
           class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-500 hover:text-slate-800 hover:bg-slate-50 border border-transparent transition-all duration-200 group">
          <svg class="w-5 h-5 text-slate-400 group-hover:text-indigo-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
          </svg>
          Dispatcher
        </a>

        <a routerLink="/register" 
           routerLinkActive="bg-indigo-50 text-indigo-700 font-bold border-indigo-200" 
           class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-500 hover:text-slate-800 hover:bg-slate-50 border border-transparent transition-all duration-200 group">
          <svg class="w-5 h-5 text-slate-400 group-hover:text-indigo-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path>
          </svg>
          App Registry
        </a>
      </nav>

      <div class="p-4 border-t border-slate-200/60 flex flex-col gap-2 bg-slate-50/50">
  <div class="flex items-center gap-3 px-3 py-2">
    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-slate-800 to-slate-900 border border-slate-700/10 shadow-sm flex items-center justify-center font-black text-white text-xs tracking-wider select-none">
      {{ userInitials }}
    </div>
    
    <div class="flex flex-col min-w-0 flex-1">
      <span class="text-xs font-bold text-slate-800 truncate" [title]="userEmail">
        {{ userEmail }}
      </span>
      <span class="text-[9px] font-extrabold text-indigo-600 uppercase tracking-widest mt-0.5">
        🛡️ {{ userRole }} Pool
      </span>
    </div>
  </div>
  
  <button (click)="onLogout()" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-xs font-bold text-rose-600 hover:bg-rose-50 border border-transparent transition-all duration-200 group">
    <svg class="w-4 h-4 text-rose-400 group-hover:text-rose-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
    </svg>
    Sign out
  </button>
</div>
    </aside>
  }

  

  <main class="flex-1 overflow-y-auto relative bg-gradient-to-br from-slate-50 via-white to-slate-100">
    <router-outlet></router-outlet>
  </main>

</div>
